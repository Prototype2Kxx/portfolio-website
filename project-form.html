<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>Scamazon Account Form | Interactive JavaScript Form Demo</title>
  <meta name="description" content="An interactive Scamazon account creation form with real-time password strength checking and a button that dodges the cursor for weak passwords.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding-top: 60px;
      position: relative;
      height: 100vh;
    }

    .form-container {
      max-width: 500px;
      margin: auto;
      padding: 2rem;
      background-color: #f8f9fa;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    #createBtn {
      position: absolute;
      bottom: 20px;
      left: 200px;
      transition: left 0.1s ease-in-out;
    }

    .strength-indicator {
      font-weight: bold;
    }

    @keyframes jump {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    #dodging {
      animation: jump 0.2s ease;
    }
  </style>
</head>
<body>

  
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">My Portfolio</a>
    </div>
  </nav>

  
  <div class="form-container">
    <h2 class="text-center mb-4">Create Your Scamazon Account</h2>
    <form>
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" placeholder="e.g. scamazon_user">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter a secure password">
        <div id="strength" class="form-text strength-indicator mt-1">Strength: </div>
      </div>
      <button type="button" id="createBtn" class="btn btn-success">Create Account</button>
    </form>
  </div>

  <script>
  const passwordInput = document.getElementById("password");
  const strengthText = document.getElementById("strength");
  const createBtn = document.getElementById("createBtn");
  const formContainer = document.querySelector(".form-container");

  let currentStrength = "Weak";
  let direction = 1; // 1 = right, -1 = left
  let currentLeft = 200; // track left manually

  function getStrength(password) {
    let score = 0;
    if (password.length >= 6) score++;
    if (/[A-Z]/.test(password)) score++;
    if (/\d/.test(password)) score++;
    if (/[^A-Za-z0-9]/.test(password)) score++;

    if (password.length < 6) return "Weak";
    if (score === 1) return "Weak";
    if (score === 2) return "Medium";
    if (score === 3) return "Strong";
    if (score === 4 && password.length >= 10) return "Very Strong";
    return "Strong";
  }

  passwordInput.addEventListener("input", () => {
    currentStrength = getStrength(passwordInput.value);
    strengthText.textContent = `Strength: ${currentStrength}`;
  });

  formContainer.addEventListener("mousemove", (e) => {
    if (["Strong", "Very Strong"].includes(currentStrength)) return;

    const mouseX = e.clientX;
    const btnRect = createBtn.getBoundingClientRect();
    const formRect = formContainer.getBoundingClientRect();
    const distance = Math.abs(mouseX - btnRect.left);

    if (distance < 100) {
      const maxLeft = formContainer.clientWidth - createBtn.offsetWidth - 10;
      const minLeft = 10;

      // Move directionally
      currentLeft += direction * 80;

      // Flip direction if hitting bounds
      if (currentLeft >= maxLeft) {
        currentLeft = maxLeft;
        direction = -1;
      } else if (currentLeft <= minLeft) {
        currentLeft = minLeft;
        direction = 1;
      }

      createBtn.style.left = `${currentLeft}px`;

      createBtn.classList.add("dodging");
      createBtn.id = "dodging";
      setTimeout(() => {
        createBtn.classList.remove("dodging");
        createBtn.id = "";
      }, 200);
    }
  });
</script>

<a href="https://ko-fi.com/georgecondrea" target="_blank" rel="noopener"
   title="Support me on Ko-fi" aria-label="Support me on Ko-fi" class="kofi-fab">
  ☕ <span class="kofi-fab-text">Donate</span>
</a>

.kofi-fab{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;align-items:center;gap:.4rem;background:#FF5E5B;color:#fff;padding:.6rem 1.1rem;border-radius:50px;text-decoration:none;font-weight:700;font-size:.875rem;box-shadow:0 4px 18px rgba(255,94,91,.4);transition:transform .2s,box-shadow .2s}

</style>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
