name: Fetch Cybersecurity News

# ─── Triggers ──────────────────────────────────────────────────
on:
  schedule:
    # Runs at 07:00 and 19:00 UTC every day
    - cron: '0 7 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:   # Allow manual run from the GitHub Actions tab

# ─── Permissions ───────────────────────────────────────────────
permissions:
  contents: write      # Needed to commit the updated news.json back to the repo

# ─── Job ───────────────────────────────────────────────────────
jobs:
  fetch-news:
    name: Fetch, Process & Deploy News
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Check out the full repo so data/news.json is available
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for git push

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install Python dependencies
      - name: Install dependencies
        run: pip install feedparser anthropic paramiko

      # 4. Run the news-fetching script
      #    Secrets are set in: GitHub repo → Settings → Secrets → Actions
      - name: Fetch and process news articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FTP_HOST:          ${{ secrets.FTP_HOST }}
          FTP_USER:          ${{ secrets.FTP_USER }}
          FTP_PASS:          ${{ secrets.FTP_PASS }}
          FTP_REMOTE_PATH: site/data/news.json
        run: python .github/scripts/fetch_news.py

      # 5. Commit the updated news.json back to the repo
      #    (so the next run can read it for deduplication)
      - name: Commit updated news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          # Only commit if the file actually changed
          git diff --staged --quiet || git commit -m "chore: update cybersecurity news [automated $(date -u +%Y-%m-%dT%H:%M)]"
          git push
